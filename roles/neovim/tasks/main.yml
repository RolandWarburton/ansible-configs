- name: Check if Neovim package is installed
  command: nvim --version
  register: neovim_output
  ignore_errors: true
  changed_when: false

- name: Extract Neovim version number
  set_fact:
    neovim_version: "{{ neovim_output.stdout | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+') | default('0.0.0', true) }}"

- name: Set fact indicating Neovim installation status
  set_fact:
    neovim_installed: "{{ neovim_output.rc == 0 and neovim_version != '0.0.0' }}"

- name: Print neovim version
  debug:
    msg: "neovim {{ 'is installed' if neovim_installed else 'is not installed' }} (version {{ neovim_version }})"

- name: Check version comparison of target and actual neovim versions
  command: dpkg --compare-versions "{{ neovim_target_version }}" gt "{{ neovim_version }}"
  register: version_comparison
  ignore_errors: true
  failed_when: false
  changed_when: false

- name: Skip running neovim upgrade
  debug:
    msg: "skipping upgrade as target version {{ neovim_target_version }} is not greater than current version {{ neovim_version }}"
  when: version_comparison.rc != 0

- name: Set flag if target version is greater than the actual version of neovim
  set_fact:
    target_neovim_version_is_greater: "{{ version_comparison.rc == 0 }}"

- name: Install or upgrade Neovim
  when: target_neovim_version_is_greater or not neovim_installed

  # download nvim config
  block:
    - name: Download neovim update
      debug:
        msg: "Updating neovim to v{{ neovim_target_version }}"

    - name: Install packages for building neovim
      apt:
        update_cache: true
        pkg:
          - luarocks
          - build-essential
          - cmake
          - fzf

    - name: Install Neovim binary (ARM64)
      when: ansible_architecture == "aarch64"

      block:
        - name: Download Neovim binary (ARM64)
          get_url:
            url: https://github.com/neovim/neovim/releases/download/v{{ neovim_target_version }}/nvim-linux-arm64.tar.gz
            dest: /tmp/nvim-linux-arm64.tar.gz
            mode: "0644"

        - name: Unzip Neovim tar gz (ARM64)
          ansible.builtin.unarchive:
            src: /tmp/nvim-linux-arm64.tar.gz
            dest: /tmp
            remote_src: true

        - name: Copy nvim to /usr/bin/nvim-linux-arm64
          ansible.builtin.copy:
            src: /tmp/nvim-linux-arm64
            dest: /usr/bin
            remote_src: true
            mode: "0755"
            group: root
            owner: root

        - name: Create symbolic link for nvim binary (ARM64)
          ansible.builtin.file:
            src: /usr/bin/nvim-linux-arm64/bin/nvim
            dest: /usr/bin/nvim
            state: link
            force: true
    - name: Install Neovim binary (x86_64)
      when: ansible_architecture == "x86_64"

      block:
        - name: Download neovim
          get_url:
            url: https://github.com/neovim/neovim/releases/download/v{{ neovim_target_version }}/nvim-linux-x86_64.tar.gz
            dest: /tmp/nvim-linux-x86_64.tar.gz
            mode: "0755"
            group: root
            owner: root
          register: nvim_downloaded

        - name: Unzip Neovim tar gz
          ansible.builtin.unarchive:
            src: /tmp/nvim-linux-x86_64.tar.gz
            dest: /tmp
            remote_src: true

        - name: Copy nvim to /usr/bin/nvim
          ansible.builtin.copy:
            src: /tmp/nvim-linux-x86_64
            dest: /usr/bin
            remote_src: true
            mode: "0755"
            group: root
            owner: root

        - name: Create symbolic link for nvim binary
          ansible.builtin.file:
            src: /usr/bin/nvim-linux-x86_64/bin/nvim
            dest: /usr/bin/nvim
            state: link
            force: true
- name: Check if nvim config exists
  stat:
    path: /home/{{ username }}/.config/nvim
  register: nvim_config_stat

- name: Clone neovim config
  become: true
  become_user: "{{ username }}"
  git:
    repo: git@github.com:rolandwarburton/nvim.conf.git
    dest: /home/{{ username }}/.config/nvim
    accept_hostkey: true
    track_submodules: true
    recursive: true
    version: master
    force: true
    key_file: /home/{{ username }}/.ssh/id_github # on the remote host
  when: not nvim_config_stat.stat.exists

# update the debian alternatives/preferences
# to set neovim as the preferred text editor
- name: Check if nvim is already registered as an alternative for editor
  command: update-alternatives --query editor
  register: editor_alternatives
  changed_when: false
  failed_when: false

- name: Register nvim as an alternative for editor
  command: update-alternatives --install /usr/bin/editor editor /usr/bin/nvim 100
  when: "'/usr/bin/nvim' not in editor_alternatives.stdout"
  register: nvim_registered
  changed_when: true

- name: Set Neovim as the default editor
  command: >
    update-alternatives --set editor /usr/bin/nvim
  when: "nvim_registered is changed or 'Value: /usr/bin/nvim' not in editor_alternatives.stdout"
  register: nvim_set
  changed_when: nvim_set.rc == 0

- name: Install tree-sitter-cli globally via npm
  community.general.npm:
    name: tree-sitter-cli
    global: true
    state: present
  become: true
