- name: Set ntfy-cli architecture
  set_fact:
    ntfy_cli_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Stat ntfy binary
  stat:
    path: "{{ ntfy_cli_bin_dir }}/ntfy"
  register: ntfy_cli_binary_stat

- name: Download ntfy binary
  become: true
  get_url:
    url: "https://github.com/binwiederhier/ntfy/releases/download/v{{ ntfy_cli_version }}/ntfy_{{ ntfy_cli_version }}_linux_{{ ntfy_cli_arch }}.tar.gz"
    dest: "/tmp/ntfy_{{ ntfy_cli_version }}_linux_{{ ntfy_cli_arch }}.tar.gz"
    mode: "0644"
  when: not ntfy_cli_binary_stat.stat.exists

- name: Extract ntfy binary
  become: true
  unarchive:
    src: "/tmp/ntfy_{{ ntfy_cli_version }}_linux_{{ ntfy_cli_arch }}.tar.gz"
    dest: "{{ ntfy_cli_bin_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "ntfy_{{ ntfy_cli_version }}_linux_{{ ntfy_cli_arch }}/ntfy"
    owner: root
    group: root
    mode: "0755"
  when: not ntfy_cli_binary_stat.stat.exists
