- name: Assert Debian 13 or newer
  assert:
    that:
      - ansible_distribution == "Debian"
      - ansible_distribution_major_version | int >= 13
    fail_msg: >-
      roles/sway targets Debian 13 (trixie) or newer; found
      {{ ansible_distribution }} {{ ansible_distribution_major_version }}.
      Older releases ship pipewire 0.3.x, where wireplumber 0.5 and
      pipewire-alsa are unavailable or incompatible.

- name: Install core packages
  apt:
    update_cache: true
    pkg:
      - sway

- name: Install portals and xwayland
  apt:
    update_cache: false
    pkg:
      - xdg-desktop-portal
      - xdg-desktop-portal-wlr
      - xwayland
      - wayland-protocols
      - libwayland-dev

- name: Install extras
  apt:
    update_cache: false
    pkg:
      - grim
      - wl-clipboard
      - imv
      - wob
      - clipman
      - wofi
      - mako-notifier
      - libnotify-bin

- name: Install audio stack
  apt:
    update_cache: false
    pkg:
      - pipewire
      - pipewire-pulse
      - pipewire-alsa
      - wireplumber
      - libspa-0.2-bluetooth

- name: Install brightnessctl on laptops
  apt:
    name: brightnessctl
    state: present
  when: ansible_form_factor in ['Notebook', 'Laptop', 'Portable', 'Sub Notebook', 'Hand Held']

- name: Copy configure laptop display script to sway configuration directory
  copy:
    src: sway-laptop-display.sh
    dest: /usr/local/bin/sway-laptop-display.sh
    mode: "0755"

# udev rule to configure screens and desktop background when HDMI plug in or out
- name: Copy on_hdmi_connected.rules to /etc/udev/rules.d/
  copy:
    src: "on_hdmi_connected.rules"
    dest: /etc/udev/rules.d/on_hdmi_connected.rules
    mode: "0644"
