- name: Stat openbao-get-secret binary
  stat:
    path: /usr/local/sbin/openbao-get-secret
  register: ntfy_common_bao_bin

- name: Stat openbao token file
  stat:
    path: /etc/credentials/openbao-token
  register: ntfy_common_bao_token

- name: Fail if openbao role has not been run
  fail:
    msg: "openbao role must run before ntfy roles (missing {{ item }})"
  loop:
    - /usr/local/sbin/openbao-get-secret
    - /etc/credentials/openbao-token
  when: not ( ntfy_common_bao_bin.stat.exists and ntfy_common_bao_token.stat.exists )
