- name: Install openbao token fetch dependencies
  apt:
    pkg:
      - curl
      - jq
    state: present

# Both scripts need root (one writes /etc/credentials, the other reads the
# token from it)
- name: Copy openbao-fetch-token script
  copy:
    src: openbao-fetch-token
    dest: /usr/local/sbin/openbao-fetch-token
    owner: root
    group: root
    mode: "0755"

- name: Copy openbao-get-secret script
  copy:
    src: openbao-get-secret
    dest: /usr/local/sbin/openbao-get-secret
    owner: root
    group: root
    mode: "0755"

- name: Fetch OpenBao token
  shell:
    cmd: /usr/local/sbin/openbao-fetch-token
  environment:
    BAO_USERNAME: "{{ bao_username }}"
    BAO_PASSWORD: "{{ bao_password }}"
  no_log: true
  changed_when: false

# Cleanup
# Previous locations, removed so a stale copy cannot shadow the real one.
- name: Remove openbao scripts from their old locations
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/bin/openbao-get-secret
    - /usr/local/sbin/fetch-bao-token.sh
    - /usr/local/sbin/fetch-bao-token
