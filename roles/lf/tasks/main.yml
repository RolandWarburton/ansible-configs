- name: Create temporary directory
  file:
    path: "{{ lf_tmp_dir }}"
    state: directory
    mode: "0755"

- name: Check if lf tar already exists
  ansible.builtin.stat:
    path: "{{ lf_tmp_dir }}/lf.tar.gz"
  register: lf_tar_stat

- name: Download lf tar
  shell: |
    {% if ansible_architecture == 'x86_64' %}
    {% set lf_arch = 'amd64' %}
    {% elif ansible_architecture.startswith('armv') %}
    {% set lf_arch = 'arm' %}
    {% else %}
    {% set lf_arch = 'arm64' %}
    {% endif %}
    curl -L "https://github.com/gokcehan/lf/releases/download/r32/lf-linux-{{ lf_arch }}.tar.gz" -o "{{ lf_tmp_dir }}/lf.tar.gz"
  args:
    creates: "{{ lf_tmp_dir }}/lf.tar.gz"
  when: not lf_tar_stat.stat.exists

- name: Set permissions on downloaded tar
  file:
    path: "{{ lf_tmp_dir }}/lf.tar.gz"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"
  when: not lf_tar_stat.stat.exists

- name: Ensure local bin directory exists
  file:
    path: "/home/{{ username }}/.local/bin"
    state: directory
    mode: "0755"
    owner: "{{ username }}"
    group: "{{ username }}"

- name: Extract lf tarball
  ansible.builtin.unarchive:
    src: "{{ lf_tmp_dir }}/lf.tar.gz"
    dest: "/home/{{ username }}/.local/bin"
    remote_src: true
    creates: "/home/{{ username }}/.local/bin/lf"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
