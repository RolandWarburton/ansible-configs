- name: Stat openbao-get-secret binary
  stat:
    path: /usr/bin/openbao-get-secret
  register: gotify_common_bao_bin

- name: Stat openbao token file
  stat:
    path: /etc/credentials/openbao-token
  register: gotify_common_bao_token

- name: Fail if openbao role has not been run
  fail:
    msg: "openbao role must run before gotify roles (missing {{ item }})"
  loop:
    - /usr/bin/openbao-get-secret
    - /etc/credentials/openbao-token
  when: not (
    gotify_common_bao_bin.stat.exists and
    gotify_common_bao_token.stat.exists
    )
