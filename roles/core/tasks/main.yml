- name: Install essential packages
  apt:
    update_cache: yes
    pkg:
      - bat
      - build-essential
      - curl
      - dnsutils
      - fd-find
      - foot-terminfo
      - fzf
      - jq
      - git
      - htop
      - lsd
      - lshw
      - man
      - network-manager
      - pinentry-curses
      - pinentry-tty
      - pkexec
      - psmisc
      - ripgrep
      - systemd-timesyncd
      - smartmontools
      - build-essential
      - tmux
      - tree
      - wget
      - zsh

- name: Install starship from apt (Debian 13+)
  apt:
    name: starship
    state: present
  when: ansible_distribution == "Debian" and ansible_distribution_major_version | int >= 13

- name: Install starship via install script (Debian < 13)
  shell: curl -sS https://starship.rs/install.sh | sh -s -- --yes
  args:
    creates: /usr/local/bin/starship
  when: ansible_distribution == "Debian" and ansible_distribution_major_version | int < 13

# zshell
- name: Check if zsh is installed
  stat:
    path: /usr/bin/zsh
  register: zsh_binary_stat

- name: Set zsh to be the default shell
  user:
    name: '{{username}}'
    shell: /usr/bin/zsh
  when: zsh_binary_stat.stat.exists
