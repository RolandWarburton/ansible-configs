# Git hooks managed by lefthook — https://lefthook.dev
# Activate once per clone:  lefthook install
# Bypass a single commit:   git commit --no-verify   (or LEFTHOOK=0 git commit)

pre-commit:
  parallel: true
  commands:
    ansible-lint:
      glob: "*.{yml,yaml}"
      run: >
        command -v ansible-lint >/dev/null 2>&1
        && ansible-lint -q {staged_files}
        || { echo "ansible-lint not installed. Run: sudo apt install ansible-lint (or bypass with git commit --no-verify)"; exit 1; }
