# Git hooks managed by lefthook — https://lefthook.dev
# Activate once per clone:  lefthook install
# Bypass a single commit:   git commit --no-verify   (or LEFTHOOK=0 git commit)

pre-commit:
  commands:
    ansible-lint:
      run: |
        if ! command -v ansible-lint >/dev/null 2>&1; then
          echo "ansible-lint not installed. Run: sudo apt install ansible-lint (or bypass with git commit --no-verify)"
          exit 1
        fi
        ansible-lint
